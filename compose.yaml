################################################
##   EAC3 Converter - Convert audio to EAC3   ##
################################################
#
# See .env.sample for the full list of supported environment variables
# with descriptions. Override any of them in the `environment:` block below.
---
services:
  eac3_converter:
    container_name: eac3_converter
    image: simonverbois/eac3-converter:latest
    volumes:
      - ./path/to/folder1:/app/input/folder1:rw
      - ./path/to/folder2:/app/input/folder2:rw
      - eac3_cache:/app/cache:rw
    environment:
      # --- System ---------------------------------------------------------
      TZ: "Europe/Paris"

      # --- App ------------------------------------------------------------
      DEBUG_MODE: "false"

      # --- Schedule -------------------------------------------------------
      START_TIME: "04:00"
      RUN_IMMEDIATELY: "false"

      # --- FFmpeg: audio quality -----------------------------------------
      # Audio output uses fixed Plex-safe profiles in code:
      # mono 128k, stereo 192k, 5.1 640k. 7.1/8ch sources fallback to 5.1 640k.
      # Deprecated: parsed for backwards compatibility only; no longer affects bitrate.
      FFMPEG_KBPS_PER_CHANNEL: "256"
      FFMPEG_DIALNORM: "-27"
      FFMPEG_MIXING_LEVEL: "80"

      # --- FFmpeg: encoder / muxer tuning --------------------------------
      FFMPEG_STRICT_MODE: "-2"
      FFMPEG_FLAGS: "+genpts"
      FFMPEG_TIMEOUT_SECONDS: "3600"
      FFMPEG_MIN_DISK_SPACE_RATIO: "1.5"
      FFMPEG_THREADS: "0"
      FFMPEG_BUFSIZE: "128k"
      FFMPEG_PERFORMANCE_FLAGS: "+discardcorrupt+genpts+igndts+ignidx"
      FFMPEG_AVOID_NEGATIVE_TS: "make_zero"
      FFMPEG_MAX_MUXING_QUEUE_SIZE: "1024"

      # --- Standalone audio files (loose .dts / .truehd) -----------------
      PROCESS_STANDALONE_AUDIO: "false"
      STANDALONE_AUDIO_EXTENSIONS: "dts,thd,truehd,dtshd"
      STANDALONE_AUDIO_KEEP_ORIGINAL: "false"
      STANDALONE_AUDIO_OUTPUT_EXTENSION: "ec3"

    restart: "no" # change if you run with the internal scheduler
    network_mode: none
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: '2G'
        reservations:
          cpus: '1.0'
          memory: '512M'
    healthcheck:
      test: ["CMD", "pgrep", "-f", "src.main"]
      interval: 1m
      timeout: 10s
      retries: 3

volumes:
  eac3_cache:
