################################################
##   EAC3 Converter - Convert audio to EAC3   ##
################################################

---
services:
  eac3_converter:
    container_name: eac3_converter
    build: .
    volumes:
      - ./test_data:/app/input:rw
      - ./cache:/app/cache:rw
    environment:
      TZ: Europe/Paris
      DEBUG_MODE: "true"
      START_TIME: "04:00"
      RUN_IMMEDIATELY: "true"
    restart: "no"
    network_mode: none
    deploy:
      resources:
        limits:
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "pgrep", "-f", "src.main"]
      interval: 1m
      timeout: 10s
      retries: 3
